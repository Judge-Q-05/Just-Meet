<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивное приглашение</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
</head>
<body>

    <div class="card-container">
        
        <div id="step-theme" class="step active">
            <h2>Выбери свое настроение на этот вечер ✨</h2>
            <div class="btn-grid">
                <button class="btn btn-theme" onclick="selectTheme('games')">🎮 Игры</button>
                <button class="btn btn-theme" onclick="selectTheme('cats')">🐱 Котики</button>
                <button class="btn btn-theme" onclick="selectTheme('anime')">🌸 Аниме</button>
            </div>
        </div>

        <div id="step-invite" class="step">
            <h2 id="dynamic-title">Приглашение</h2>
            <img id="dynamic-img" src="" alt="Тематическая иллюстрация" class="main-img">
            <p id="dynamic-text">Текст приглашения</p>
            <div class="btn-row">
                <button class="btn btn-yes" onclick="nextStep(3)">Да</button>
                <button class="btn btn-no" id="runaway-btn">Нет</button>
            </div>
        </div>

        <div id="step-joy" class="step">
            <h2 id="joy-title">Ура!</h2>
            <img id="joy-img" src="" alt="Радость" class="main-img">
            <p id="joy-text"></p>
            <button class="btn" onclick="nextStep(4)">Продолжить 🥰</button>
        </div>

        <div id="step-date" class="step">
            <h2>Когда тебе удобно? 📅</h2>
            <div class="form-group">
                <label>Выберите дату:</label>
                <input type="date" id="input-date">
            </div>
            <div class="form-group">
                <label>Выберите время:</label>
                <input type="time" id="input-time">
            </div>
            <div class="form-group">
                <label>Или напиши свою идею/комментарий:</label>
                <input type="text" id="date-custom" placeholder="Например: лучше на следующих выходных...">
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="registerNotToday('Шаг Даты')">Не сегодня 💔</button>
                <button class="btn" onclick="saveDateAndNext()">Далее</button>
            </div>
        </div>

        <div id="step-place" class="step">
            <h2>Куда заглянем покушать? 🍕</h2>
            <div id="restaurant-options" class="btn-grid">
                </div>
            
            <div class="form-group" style="margin-top: 20px;">
                <label>Свой вариант места:</label>
                <input type="text" id="place-custom" placeholder="Название или адрес...">
                <button class="btn btn-map" onclick="openMapModal()">📍 Выбрать на карте</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="registerNotToday('Шаг Ресторана')">Не сегодня 💔</button>
                <button class="btn" onclick="savePlaceAndNext()">Завершить выбор ✨</button>
            </div>
        </div>

        <div id="step-final" class="step">
            <h2>Всё готово! 💖</h2>
            <p>Я сохранил все твои пожелания. Нажми кнопку ниже, чтобы отправить их мне в Telegram!</p>
            <button class="btn btn-yes" id="submit-form-btn" onclick="sendDataToServer()">Отправить приглашение 🚀</button>
            <p id="status-message" style="margin-top: 15px; font-weight: bold;"></p>
        </div>

    </div>

    <div id="map-modal" class="modal">
        <div class="modal-content">
            <h3>Кликни на место на карте</h3>
            <div id="yandex-map" style="width: 100%; height: 350px;"></div>
            <div style="margin-top: 15px; text-align: right;">
                <button class="btn btn-secondary" onclick="closeMapModal()">Отмена</button>
                <button class="btn" onclick="confirmMapPlace()">Выбрать это место</button>
            </div>
        </div>
    </div>

</body>
</html>
